<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pizzaria Delícia</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <button id="themeToggle" class="theme-toggle">🌙</button> <!-- Botão de tema no canto superior esquerdo -->
    <div class="login-container">
        <h1 class="rubik">Bem-vindo à Riggo pizzaria!</h1>
        <p>Faça login para acessar o sistema.</p>
        <form id="loginForm">
            <label for="username">Usuário:</label>
            <input type="text" id="username" name="username" required>
            
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Entrar</button>
        </form>
        <div class="links">
            <a href="#" id="forgotPassword">Esqueceu a senha?</a>
            <a href="#" id="createAccount">Criar conta</a>
        </div>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
